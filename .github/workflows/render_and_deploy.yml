name: Render figures and deploy website

# Render the Quarto website on every push to main, every pull request, or by
# manual dispatch. Rendering executes every figure, so it doubles as a CI check
# that they all still build. Only merges to main publish the rendered site to
# the gh-pages branch, which triggers a GitHub Pages deployment.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: neuroinformatics-unit/actions/lint@v2

  render-and-deploy:
    name: Render and deploy
    permissions:
      contents: write # to push to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: uv sync

      # movement downloads sample datasets with pooch into ~/.movement.
      # Caching them avoids re-fetching on every run.
      - name: Cache movement sample data
        uses: actions/cache@v6
        with:
          path: ~/.movement
          key: sample-data-${{ runner.os }}
          restore-keys: sample-data

      # Quarto's freeze (execute: freeze: auto) stores each figure's execution
      # results in _freeze and re-runs only figures whose source changed. Caching
      # it keyed on the figure/style sources skips re-executing unchanged figures;
      # the restore-keys fallback is safe because Quarto re-executes on its own
      # when a source hash no longer matches.
      - name: Cache Quarto freeze
        uses: actions/cache@v6
        with:
          path: _freeze
          key: freeze-${{ runner.os }}-${{ hashFiles('figures/**', 'src/movement_figures/**', 'uv.lock') }}
          restore-keys: freeze-${{ runner.os }}-

      - name: Render Quarto project
        run: uv run quarto render

      # Publishing pushes _site to gh-pages and adds the .nojekyll file that
      # stops GitHub Pages from running the site through Jekyll.
      - name: Publish to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
